<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0a18;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 675px;
    width: 1200px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 32px 40px;
    width: 100%;
    height: 100%;
  }
  .panel {
    flex: 1;
    height: 100%;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    border: 1px solid rgba(255,255,255,0.08);
    background: #110d1f;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .panel img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .label {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 8px 20px;
    border-radius: 24px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    z-index: 10;
    white-space: nowrap;
  }
  .label-before {
    background: rgba(248, 81, 73, 0.2);
    color: #f85149;
    border: 1px solid rgba(248, 81, 73, 0.3);
  }
  .label-after {
    background: rgba(63, 185, 80, 0.2);
    color: #3fb950;
    border: 1px solid rgba(63, 185, 80, 0.3);
  }
  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.4);
    font-size: 40px;
    flex-shrink: 0;
    width: 48px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="label label-before">Before — Grade F</div>
    <img id="before" />
  </div>
  <div class="arrow">→</div>
  <div class="panel">
    <div class="label label-after">After — Grade A</div>
    <img id="after" />
  </div>
</div>
</body>
</html>
